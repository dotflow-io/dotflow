site_name: Dotflow
site_url: https://dotflow.io
site_author: Fernando Celmer

copyright: Fernando Celmer
repo_name: dotflow-io/dotflow
repo_url: https://github.com/dotflow-io/dotflow

theme:
  name: material
  favicon: assets/logo.ico
  logo: assets/logo.png
  palette:
    - media: (prefers-color-scheme)
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: black
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference
  features:
  - content.tooltips
  - navigation.footer
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - navigation.path
  - navigation.indexes
  - search.share
  - search.suggest

extra_css:
  - assets/style.css

extra:
  version:
    provider: mike
  python_supported_version: 3.9

markdown_extensions:
  abbr: null
  attr_list: null
  footnotes: null
  md_in_html: null
  tables: null
  toc:
    permalink: true
  pymdownx.betterem: null
  pymdownx.caret: null
  pymdownx.highlight:
    line_spans: __span
  pymdownx.inlinehilite: null
  pymdownx.keys: null
  pymdownx.mark: null
  pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ''
  pymdownx.tilde: null
  pymdownx.blocks.admonition:
    types:
    - note
    - attention
    - caution
    - danger
    - error
    - tip
    - hint
    - warning
    - info
    - check
  pymdownx.blocks.details: null
  pymdownx.blocks.tab:
    alternate_style: true
  pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
  mdx_include: null
  markdown_include_variants: null

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            backlinks: tree
            heading_level: 2
            show_root_heading: true
            show_if_no_docstring: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            extensions:
            - griffe_typingdoc
  - i18n:
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português
          build: true
          nav_translations:
            Home: Início
            Concepts: Conceitos
            Overview: Visão geral
            How-to guides: Guias práticos
            Workflows: Fluxos de trabalho
            Tasks: Tarefas
            Advanced: Avançado
            Examples: Exemplos
            Development Guide: Guia de Desenvolvimento
            Release Notes: Notas de Lançamento
            Process Mode: Modo de Processamento
            Providers: Provedores
            Storage: Armazenamento
            Notify: Notificações
            Log: Registro
            Scheduler: Agendador
            Strategies: Estratégias
            Callback: Callback
            "Dotflow CLI": "CLI do Dotflow"
            Reference: Referência
            Integrations: Integrações
            AWS: AWS
            GCP: GCP
            Telegram: Telegram
            Built-in: Integrados
            "Use integrations": "Usar integrações"
            "Workflow and tasks": "Fluxo de trabalho e tarefas"
            "Task lifecycle and status": "Ciclo de vida e status da tarefa"
            "Cron overlap": "Sobreposição no cron"
            "Concept of context": "Conceito de contexto"
  - redirects:
      redirect_maps:
        # Short-lived URLs (/nav/how-to/tutorial/...) → canonical /nav/tutorial/...
        nav/how-to/tutorial/async-actions.md: nav/tutorial/async-actions.md
        nav/how-to/tutorial/checkpoint.md: nav/tutorial/checkpoint.md
        nav/how-to/tutorial/error-handling.md: nav/tutorial/error-handling.md
        nav/how-to/tutorial/first-steps.md: nav/tutorial/first-steps.md
        nav/how-to/tutorial/groups.md: nav/tutorial/groups.md
        nav/how-to/tutorial/initial-context.md: nav/tutorial/initial-context.md
        nav/how-to/tutorial/install.md: nav/tutorial/install.md
